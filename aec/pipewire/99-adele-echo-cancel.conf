# Adele acoustic echo cancellation — PipeWire module (Linux only).
#
# Loads the WebRTC echo canceller and exposes two virtual nodes:
#
#   adele_ec_source  — the microphone with Adele's own playback removed
#   adele_ec_sink    — anything played here becomes the AEC *reference*
#                      (and is forwarded on to the real speakers)
#
# Adele plays her TTS into the sink and captures from the source, so her own
# voice is cancelled out of the mic. Without this she hears herself through the
# speakers and barges in on / answers her own readouts (the "talks to herself"
# loop). This is the Linux *enhancement* that lets full-duplex barge-in
# (`audio.mic_barge_in`) be turned back on; the cross-platform half-duplex
# guard in adele-voice-module is the floor that works without it.
#
# The hardware ends (`capture`/`playback`) follow the *default* devices, so
# whichever mic/speaker you choose in your sound settings is what gets
# cancelled — nothing here is pinned to a device. They are `passive`, so the
# canceller only grabs the hardware while something is using the virtual nodes.
#
# Routing *only* Adele through these nodes is done by the companion WirePlumber
# hook (aec/wireplumber/). This file alone is harmless: it just adds two unused
# virtual devices until the hook routes Adele to them.
#
# Installed to ~/.config/pipewire/pipewire.conf.d/ by `just install-aec`.

context.modules = [
  { name = libpipewire-module-echo-cancel
    args = {
      # The WebRTC AEC SPA plugin — ships with PipeWire, no C++ build on our
      # side (/usr/lib/spa-0.2/aec/libspa-aec-webrtc.so).
      library.name = aec/libspa-aec-webrtc

      capture.props = {
        node.name    = "adele.ec.capture"
        node.passive = true
      }
      source.props = {
        node.name        = "adele_ec_source"
        node.description = "Adele (echo-cancelled mic)"
        media.class      = "Audio/Source"
      }
      sink.props = {
        node.name        = "adele_ec_sink"
        node.description = "Adele (echo-cancelled speaker)"
        media.class      = "Audio/Sink"
      }
      playback.props = {
        node.name    = "adele.ec.playback"
        node.passive = true
      }
    }
  }
]
