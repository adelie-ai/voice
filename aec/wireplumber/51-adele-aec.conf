# Registers the Adele AEC stream-router hook (adele-aec-target.lua) with
# WirePlumber and wires it into the standard linking policy.
#
# Declaring the script as `script/lua` pulls in lua-scripting automatically. But
# WirePlumber 0.5 only *loads* a component if some enabled feature wants it, so
# the component alone is an orphan — we also merge our hook into the
# `policy.linking.standard` virtual feature's `wants` list (via components.rules)
# so it loads alongside the built-in find-*-target hooks.
#
# The script itself lives in ~/.config/wireplumber/scripts/ — installed
# alongside this file by `just install-aec`.

wireplumber.components = [
  { name = adele-aec-target.lua, type = script/lua
    provides = hooks.linking.adele-aec-target }
]

wireplumber.components.rules = [
  {
    matches = [ { provides = "policy.linking.standard" } ]
    actions = {
      merge = { wants = [ hooks.linking.adele-aec-target ] }
    }
  }
]
